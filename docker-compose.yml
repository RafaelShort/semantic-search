version: '3.8'

services:

  # ─── ElasticSearch ────────────────────────────────────────────
  # Motor de busca principal: indexa documentos e executa buscas
  # vetoriais (kNN) e full-text (BM25)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node        # Modo single-node (desenvolvimento)
      - xpack.security.enabled=false      # Sem auth (apenas para dev!)
      - ES_JAVA_OPTS=-Xms1g -Xmx1g       # Limite de memória JVM
    ports:
      - "9200:9200"   # API REST
      - "9300:9300"   # Comunicação entre nós (cluster)
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - semantic_search_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Kibana ───────────────────────────────────────────────────
  # Interface web para visualizar dados do ElasticSearch
  # Acesse: http://localhost:5601
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - semantic_search_net

  # ─── MongoDB ──────────────────────────────────────────────────
  # Armazena documentos brutos e chunks processados
  # Schema flexível = ideal para diferentes tipos de arquivo
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
      - MONGO_INITDB_DATABASE=semantic_search
    volumes:
      - mongodb_data:/data/db
    networks:
      - semantic_search_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Mongo Express ────────────────────────────────────────────
  # Interface web para visualizar dados do MongoDB
  # Acesse: http://localhost:8081
  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password123
      - ME_CONFIG_MONGODB_URL=mongodb://admin:password123@mongodb:27017/
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - semantic_search_net

# ─── Volumes persistentes ─────────────────────────────────────
volumes:
  elasticsearch_data:
    driver: local
  mongodb_data:
    driver: local

# ─── Rede interna ─────────────────────────────────────────────
networks:
  semantic_search_net:
    driver: bridge
